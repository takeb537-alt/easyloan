name: EasyLoan Build APK

# Isse build tab trigger hogi jab aap 'main' branch par push karenge
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Isse aap manually bhi build start kar sakte hain

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # 1. Code ko GitHub runner mein checkout karna
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Java setup (Android build ke liye zaroori hai)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Flutter version 3.22.0 setup (Aapki requirement)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 4. Permissions dena (Mobile users ke liye yahi sabse badi problem hoti hai)
      - name: Give Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 5. Pub Get (Dependencies download karna)
      - name: Install dependencies
        run: flutter pub get

      # 6. APK Build (Release mode)
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # 7. APK ko GitHub par upload karna (Download karne ke liye)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
