plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.easyloan" // Apne package name se badal sakte hain
    compileSdk 34

    defaultConfig {
        applicationId "com.example.easyloan"
        minSdk 21 // ML Kit ke liye 21 zaroori hai
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug // Testing ke liye debug signing kaafi hai
            shrinkResources false
            minifyEnabled false
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
}
